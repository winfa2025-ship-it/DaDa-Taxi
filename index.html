  <script>

      theme: {
        extend: {

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #1a1a1a;
      color: #ffffff;
      min-height: 100vh;
      overflow-x: hidden;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { transform: translateX(-100%); }
      to { transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    .animate-slide-in { animation: slideIn 0.3s ease-out; }
    .animate-pulse-slow { animation: pulse 2s ease-in-out infinite; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #2d2d2d; }
    ::-webkit-scrollbar-thumb { background: #FF6B00; border-radius: 3px; }
    .btn-primary {
      background-color: #FF6B00;
      color: white;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 12px;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
      width: 100%;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-black {
      background-color: #000000;
      color: white;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 12px;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
    }
    .btn-black:hover { filter: brightness(0.9); }
    .btn-outline {
      border: 2px solid #FF6B00;
      color: #FF6B00;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 12px;
      transition: all 0.3s;
      background: transparent;
      cursor: pointer;
    }
    .btn-outline:hover { background: #FF6B00; color: white; }
    .input-field {
      width: 100%;
      background-color: #2d2d2d;
      border: 1px solid #3d3d3d;
      color: white;
      border-radius: 12px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.3s;
    }
    .input-field:focus { border-color: #FF6B00; }
    .card {
      background-color: #2d2d2d;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      color: rgba(255,255,255,0.7);
      transition: color 0.3s;
      cursor: pointer;
      font-size: 12px;
    }
    .nav-item:hover, .nav-item.active { color: #FF6B00; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      height: 100%;
      background: #2d2d2d;
      z-index: 51;
      animation: slideIn 0.3s ease-out;
      display: flex;
      flex-direction: column;
    }
  </style>

            return <WelcomePage t={t} setPage={setPage} />;
          case 'login':
            return <LoginPage t={t} setPage={setPage} setUser={setUser} setIsLoggedIn={setIsLoggedIn} setShowCountrySelect={setShowCountrySelect} />;
          case 'register':
            return <RegisterPage t={t} setPage={setPage} setUser={setUser} setIsLoggedIn={setIsLoggedIn} setShowCountrySelect={setShowCountrySelect} />;
          case 'home':
            return <HomePage t={t} setPage={setPage} user={user} selectedCountry={selectedCountry} setShowCountrySelect={setShowCountrySelect} />;
          case 'rideRequest':
            return <RideRequestPage t={t} selectedCountry={selectedCountry} setPage={setPage} />;
          case 'rideActive':
            return <RideActivePage t={t} setPage={setPage} />;
          case 'messages':
            return <MessagesPage t={t} setPage={setPage} />;
          case 'orders':
            return <OrdersPage t={t} setPage={setPage} />;
          case 'cancelOrder':
            return <CancelOrderPage t={t} setPage={setPage} />;
          case 'safety':
            return <SafetyPage t={t} setPage={setPage} />;
          case 'subscription':
            return <SubscriptionPage t={t} user={user} setUser={setUser} selectedCountry={selectedCountry} setPage={setPage} />;
          case 'profile':
            return <ProfilePage t={t} setPage={setPage} user={user} setUser={setUser} selectedLanguage={selectedLanguage} setSelectedLanguage={setSelectedLanguage} />;
          case 'menu':
            setSidebarOpen(true);
            return <HomePage t={t} setPage={setPage} user={user} selectedCountry={selectedCountry} setShowCountrySelect={setShowCountrySelect} />;
          case 'menuOpen':
            setSidebarOpen(true);
            return null;
          default:
            return <HomePage t={t} setPage={setPage} user={user} selectedCountry={selectedCountry} setShowCountrySelect={setShowCountrySelect} />;
        }
      };

      return (
        <div className="min-h-screen bg-dark">
          <AdBanner />
          <div className="pt-8">
            {renderPage()}
          </div>

          <Sidebar
            isOpen={sidebarOpen}
            onClose={() => setSidebarOpen(false)}
            t={t}
            setPage={setPage}
          />

          {showCountrySelect && (
            <CountrySelectPage
              t={t}
              setShowCountrySelect={setShowCountrySelect}
              selectedCountry={selectedCountry}
              setSelectedCountry={setSelectedCountry}
              setPage={setPage}
            />
          )}

          {!showCountrySelect && page !== 'welcome' && page !== 'login' && page !== 'register' && (
            <BottomNav t={t} page={page} setPage={setPage} />
          )}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
